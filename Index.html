<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gênio Impossible</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Menu Inicial -->
        <div id="menu" class="screen">
            <h1>Gênio Impossible</h1>
            <p>Criado por: Harahel</p>
            <button onclick="startGame()">Jogar</button>
            <button onclick="showScreen('credits')">Créditos</button>
            <button onclick="showScreen('instructions')">Instruções</button>
        </div>

        <!-- Tela de Jogo -->
        <div id="quiz" class="screen" style="display:none;">
            <div id="header-info">
                <span id="current-theme">Tema: Ciência</span>
                <span id="score">Acertos: 0</span>
            </div>
            <h2 id="question-text">Pergunta aqui?</h2>
            <div id="options-container"></div>
        </div>

        <!-- Instruções -->
        <div id="instructions" class="screen" style="display:none;">
            <h2>Como Jogar</h2>
            <ul>
                <li>Sempre começa com <b>Ciência</b>.</li>
                <li>Se errar, volta para o início.</li>
                <li>Ao reiniciar, o tema muda automaticamente.</li>
            </ul>
            <button onclick="showScreen('menu')">Voltar</button>
        </div>

        <!-- Créditos -->
        <div id="credits" class="screen" style="display:none;">
            <h2>Créditos</h2>
            <p>Criador: Harahel[cite: 1]</p>
            <p>Mais de 200 perguntas criadas manualmente[cite: 1].</p>
            <button onclick="showScreen('menu')">Voltar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
