<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gênio Impossible - Harahel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- TELA: MENU -->
        <div id="menu" class="screen">
            <h1 class="glow-text">Gênio <br><span class="highlight">Impossible</span></h1>
            <input type="text" id="player-name" placeholder="Seu Nick..." class="input-style">
            <div class="menu-buttons">
                <button onclick="startGame()" class="btn-main">JOGAR</button>
                <button onclick="showRanking()" class="btn-sub">RANKING 🏆</button>
                <button onclick="showScreen('config')" class="btn-sub">CONFIGURAÇÕES</button>
            </div>
            <p class="footer-tag">Criado por: Harahel</p>
        </div>

        <!-- TELA: RANKING -->
        <div id="ranking" class="screen" style="display:none;">
            <h2 class="highlight">🏆 RANKING</h2>
            <div id="ranking-list"></div>
            <button onclick="showScreen('menu')" class="btn-main">VOLTAR</button>
        </div>

        <!-- TELA: GAMEPLAY -->
        <div id="quiz" class="screen" style="display:none;">
            <div class="progress-container"><div id="progress-bar"></div></div>
            <div class="status-bar">
                <span id="theme-display">---</span>
                <span id="score-display">0 PTS</span>
            </div>
            <div class="question-box">
                <h2 id="question-text">Preparando...</h2>
            </div>
            <div id="options-container"></div>
        </div>

    </div>

    <script src="database.js"></script>
    <script src="script.js"></script>
</body>
</html>
