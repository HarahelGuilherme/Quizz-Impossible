<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gênio Impossible - Harahel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- TELA: MENU -->
        <div id="menu" class="screen">
            <h1 class="glow-text">Gênio <br><span class="highlight">Impossible</span></h1>
            
            <input type="text" id="player-name" placeholder="Digite seu Nick..." class="input-style">

            <div class="menu-buttons">
                <button onclick="startGame()" class="btn-main">JOGAR</button>
                <button onclick="showRanking()" class="btn-sub">RANKING 🏆</button>
                <button onclick="showScreen('config')" class="btn-sub">CONFIGURAÇÕES</button>
                <button onclick="window.close()" class="btn-exit">FECHAR GAME</button>
            </div>
            <p class="footer-tag">Criado por: Harahel</p>
        </div>

        <!-- TELA: CONFIGURAÇÕES -->
        <div id="config" class="screen" style="display:none;">
            <h2>Configurações</h2>
            <div class="config-group">
                <label>Volume dos Efeitos:</label>
                <input type="range" min="0" max="100" value="50" class="slider" oninput="updateVolume(this.value)">
            </div>
            <button onclick="showScreen('menu')" class="btn-main">VOLTAR</button>
        </div>

        <!-- TELA: RANKING -->
        <div id="ranking" class="screen" style="display:none;">
            <h2>🏆 Hall da Fama</h2>
            <div id="ranking-list"></div>
            <button onclick="showScreen('menu')" class="btn-main">VOLTAR AO MENU</button>
        </div>

        <!-- TELA: GAMEPLAY (QUIZ) -->
        <div id="quiz" class="screen" style="display:none;">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            
            <div class="status-bar">
                <span id="theme-display">TEMA: ---</span>
                <span id="score-display">SCORE: 0</span>
            </div>

            <div class="question-box">
                <h2 id="question-text">Carregando...</h2>
            </div>

            <div id="options-container"></div>
        </div>

    </div>

    <!-- Scripts na ordem correta -->
    <script src="database.js"></script>
    <script src="script.js"></script>
</body>
</html>
